name: Scrap Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # 1. Install uv instead of standard setup-python
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true # Speeds up future runs by caching dependencies

      # 2. Pin the Python version using uv (Matches your previous 3.12 setup)
      - name: Set up Python
        run: uv python install 3.12

      # 3. uv run will automatically read pyproject.toml, install deps, and run the file
      - name: Run script
        run: uv run main.py

      